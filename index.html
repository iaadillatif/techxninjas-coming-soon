<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon | TechXNinjas</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background-color: #000;
        color: #fff;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        text-align: center;
      }

      h1 {
        font-size: 3rem;
        margin-bottom: 30px;
        letter-spacing: 2px;
      }

      .newsletter {
        display: flex;
        justify-content: center;
      }

      iframe {
        border-radius: 8px;
      }

      /* Responsive */
      @media (max-width: 500px) {
        h1 {
          font-size: 2rem;
        }

        iframe {
          width: 100%;
          height: 500px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Coming Soon...</h1>

      <div class="newsletter">
        <iframe
          src="https://techxninjas.substack.com/embed"
          width="480"
          height="400"
          style="border: 1px solid #eee; background: white"
          frameborder="0"
          scrolling="no"
        >
        </iframe>
      </div>
    </div>
  </body>
</html>
